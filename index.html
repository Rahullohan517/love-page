<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Question 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#e8445a;--blush:#fce4ec;--deep-rose:#c62a47;
  --cream:#fff9f5;--text:#3d1a24;--muted:#9e6070;
}
body{
  font-family:'Lato',sans-serif;
  background:var(--cream);min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* floating bg hearts */
.hbg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.hf{position:absolute;bottom:-60px;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{
  0%{transform:translateX(0) scale(.6);opacity:0}
  10%{opacity:.5}90%{opacity:.35}
  100%{transform:translateX(var(--d)) translateY(-110vh) scale(1.1);opacity:0}
}

/* card */
.card{
  position:relative;z-index:10;background:#fff;border-radius:28px;
  box-shadow:0 24px 80px rgba(220,60,90,.14),0 4px 20px rgba(0,0,0,.06);
  padding:3rem 3.5rem;max-width:560px;width:92vw;text-align:center;
  animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
  transition:transform .08s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:none}}

.dots{display:flex;gap:8px;justify-content:center;margin-bottom:2rem;}
.dot{width:9px;height:9px;border-radius:50%;background:#f0d4da;transition:background .3s,transform .3s;}
.dot.active{background:var(--rose);transform:scale(1.3);}
.dot.done{background:var(--deep-rose);}

.q-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;}
.big-emoji{font-size:3.6rem;margin-bottom:1rem;display:block;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.question{
  font-family:'Playfair Display',serif;font-size:1.48rem;
  line-height:1.55;color:var(--text);margin-bottom:2.2rem;
}

.btn-row{
  display:flex;gap:14px;justify-content:center;
  flex-wrap:wrap;align-items:center;min-height:56px;position:relative;
}

.btn-yes{
  font-family:'Lato',sans-serif;font-weight:700;font-size:1rem;
  letter-spacing:.5px;padding:14px 38px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--rose),var(--deep-rose));
  color:#fff;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 6px 24px rgba(200,42,71,.35);
}
.btn-yes:hover{transform:scale(1.07);box-shadow:0 8px 30px rgba(200,42,71,.45);}
.btn-yes:active{transform:scale(.97);}

/* No button — goes fixed when released */
#noBtn{
  font-family:'Lato',sans-serif;font-weight:400;font-size:.9rem;
  padding:11px 26px;border:1.5px solid #f0c0cc;border-radius:50px;
  background:transparent;color:var(--muted);cursor:pointer;
  transition:background .2s,color .2s,font-size .25s,padding .25s,opacity .3s;
  white-space:nowrap;user-select:none;
  position:relative;z-index:20;
}
#noBtn:hover{background:var(--blush);color:var(--rose);}

.sass-msg{
  font-size:.82rem;color:var(--muted);margin-top:14px;
  min-height:1.2em;font-style:italic;
}
.sass-msg.pop{animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* slide transitions */
.slide-out{animation:sOut .35s cubic-bezier(.4,0,1,1) forwards;}
.slide-in {animation:sIn  .45s cubic-bezier(.22,1,.36,1) both;}
@keyframes sOut{to{opacity:0;transform:translateX(-55px) scale(.95)}}
@keyframes sIn {from{opacity:0;transform:translateX(55px) scale(.96)}to{opacity:1;transform:none}}

/* ── FINAL FULL-SCREEN ── */
#finalScreen{
  display:none;position:fixed;inset:0;z-index:500;
  background:linear-gradient(160deg,#fff0f5 0%,#ffe8f0 40%,#fff8ee 100%);
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
  animation:fIn .7s cubic-bezier(.22,1,.36,1) both;
}
#finalScreen.visible{display:flex;}
@keyframes fIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}

.final-ring{font-size:5rem;animation:rPop .6s cubic-bezier(.22,1,.36,1);margin-bottom:1rem;z-index:2;position:relative;}
@keyframes rPop{from{transform:scale(0) rotate(-25deg)}to{transform:scale(1) rotate(0)}}

.final-h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5vw,2.8rem);color:var(--text);
  margin-bottom:.9rem;line-height:1.3;z-index:2;position:relative;
}
.final-p{
  font-size:1.05rem;color:var(--muted);line-height:1.8;
  max-width:420px;z-index:2;position:relative;
}
.final-love{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:1.25rem;color:var(--rose);
  margin-top:1.2rem;z-index:2;position:relative;
}

/* heart rain */
#heartRain{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.hrp{
  position:absolute;top:-80px;
  animation:hrFall linear forwards;
}
@keyframes hrFall{
  0%{opacity:1;transform:translateX(0) rotate(0deg) scale(1)}
  100%{opacity:.15;transform:translateX(var(--hd)) translateY(115vh) rotate(var(--hr)) scale(var(--hs))}
}

/* confetti */
.cp{
  position:fixed;border-radius:2px;
  animation:cpFall linear forwards;pointer-events:none;z-index:600;
}
@keyframes cpFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="hbg" id="hbg"></div>

<div class="card" id="mainCard">
  <div class="dots" id="dots"></div>
  <div id="questionSection">
    <p class="q-label" id="qLabel">Question 1 of 5</p>
    <span class="big-emoji" id="qEmoji">🥺</span>
    <p class="question" id="qText"></p>
    <div class="btn-row" id="btnRow">
      <button class="btn-yes" id="yesBtn" onclick="nextQuestion()">Absolutely Yes 💖</button>
      <button id="noBtn" onclick="noClicked()">No…?</button>
    </div>
    <p class="sass-msg" id="sassMsg"></p>
  </div>
</div>

<!-- Final full screen -->
<div id="finalScreen">
  <div id="heartRain"></div>
  <span class="final-ring">💍</span>
  <h1 class="final-h1">She said YES! 🥹<br>Every single time!</h1>
  <p class="final-p">
    Across every timezone, every sleepless video call,<br>
    every "goodnight" that was never long enough —<br>
    you have always been the one. ☀️
  </p>
  <p class="final-love">"I love you. Always. Every life. Every time."</p>
</div>

<script>
const Qs = [
  {
    emoji:"😏",
    text:"Could you please tease me for the rest of your life?",
    yesLabel:"With GREAT pleasure 😈",
    no:[
      "Oh so those 2am voice notes were fake?? 😭",
      "Your memes in my DMs are literal EVIDENCE 📱🤭",
      "Babe I have screenshots. Every. Single. One. 👀",
      "The wifi literally carries your teasing energy from 1000km away 🛜😂",
      "WRONG — the whole internet knows you do this 😤"
    ]
  },
  {
    emoji:"👋",
    text:"Will you trouble me by spanking me the very second you finally get the chance?",
    yesLabel:"Already saving up for the visit! 🙌",
    no:[
      "So those 'just wait till I see you' texts were jokes?? 😂",
      "You literally threatened me over video call last week 🤭",
      "Long distance isn't saving you from this answer, babe 👀",
      "Your hands are itching from 1000km away, I can sense it 😭",
      "FINE. But we BOTH know the truth 😤"
    ]
  },
  {
    emoji:"🎵",
    text:"Will you fall asleep on our video calls while I sing songs and tell you how much I love you?",
    yesLabel:"Already nodding off thinking about it 🌙",
    no:[
      "YOU DID THIS LITERALLY LAST TUESDAY 😂",
      "I watched you nodding off on-screen for 20 whole minutes 🥹",
      "The camera was ON. I SAW EVERYTHING. 👁️",
      "You even snored a little. It was adorable. 😭💕",
      "Your phone 'died' suspiciously fast. I know why. 💤😂"
    ]
  },
  {
    emoji:"🌌",
    text:"For every life we live — even the ones without Wi-Fi — will you choose me every single time?",
    yesLabel:"Every universe. Every time. ♾️",
    no:[
      "Rude!! Even in the dinosaur era?? 🦕😭",
      "What if I found you across 10,000 kilometres again? Still no?",
      "The distance is already saying yes for you, darling 🌍💕",
      "Even the stars connecting our timezones voted YES ⭐",
      "Okay. I'll just find you first then. Every. Single. Time. 😤"
    ]
  },
  {
    emoji:"💍",
    text:"After every late-night call, every timezone battle, every 'I miss you' — will you marry me, my lovely sunshine? ☀️",
    yesLabel:"YES! A thousand times YES! 💍",
    no:[
      "Excuse me?? After ALL those calls?? 👁️👄👁️",
      "The connection dropped but NOT my feelings 😤📶",
      "I am BUFFERING at this response 🔄😭",
      "Even the satellites are disappointed right now 🛰️",
      "Last chance before I call your mum on video 😂🙏"
    ]
  }
];

let cur = 0, noCount = 0, noFixed = false, noRepel = false;
const noBtn   = document.getElementById('noBtn');
const sassMsg = document.getElementById('sassMsg');
const card    = document.getElementById('mainCard');
const btnRow  = document.getElementById('btnRow');

/* ── build progress dots ── */
function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  Qs.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className='dot'+(i<cur?' done':i===cur?' active':'');
    c.appendChild(d);
  });
}

/* ── fill question ── */
function fill(q) {
  document.getElementById('qLabel').textContent = `Question ${cur+1} of ${Qs.length}`;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent  = q.text;
  sassMsg.textContent=''; sassMsg.className='sass-msg';
  document.getElementById('yesBtn').textContent = q.yesLabel;
  noBtn.textContent = 'No…?';
  noBtn.onclick = noClicked;
}

/* ── load question ── */
function loadQuestion(animate) {
  noCount=0; noRepel=false;
  returnNoToRow();
  const q = Qs[cur];
  const sec = document.getElementById('questionSection');
  if (animate) {
    sec.classList.add('slide-out');
    setTimeout(()=>{
      sec.classList.remove('slide-out');
      fill(q); buildDots();
      sec.classList.add('slide-in');
      setTimeout(()=>sec.classList.remove('slide-in'),500);
    },350);
  } else { fill(q); buildDots(); }
}

function returnNoToRow() {
  if (noFixed) {
    noBtn.style.position='relative';
    noBtn.style.left=''; noBtn.style.top='';
    btnRow.appendChild(noBtn);
    noFixed=false;
  }
  noBtn.style.fontSize='.9rem';
  noBtn.style.padding='11px 26px';
  noBtn.style.opacity='1';
  noBtn.style.pointerEvents='auto';
}

/* ── next question ── */
function nextQuestion() {
  cur++;
  if (cur>=Qs.length){ showFinal(); return; }
  loadQuestion(true);
}

/* ── No button behaviour ── */
const sizes=[
  {fs:'.88rem',pad:'10px 22px',op:'1'},
  {fs:'.72rem',pad:'8px 17px', op:'.85'},
  {fs:'.57rem',pad:'6px 13px', op:'.7'},
  {fs:'.42rem',pad:'5px 10px', op:'.5'},
  {fs:'.3rem', pad:'4px 7px',  op:'.3'},
];

function noClicked(){
  const msgs = Qs[cur].no;
  const msg  = msgs[Math.min(noCount, msgs.length-1)];
  sassMsg.className='sass-msg';
  void sassMsg.offsetWidth;
  sassMsg.className='sass-msg pop';
  sassMsg.textContent = msg;
  noCount++;

  shakeCard();

  // shrink
  const s = sizes[Math.min(noCount-1, sizes.length-1)];
  noBtn.style.fontSize=s.fs;
  noBtn.style.padding =s.pad;
  noBtn.style.opacity =s.op;

  // release to roam after 2nd click
  if (noCount===2) releaseNo();

  // start repelling after 3rd click
  if (noCount>=3) noRepel=true;

  // last stage: surrender
  if (noCount>=msgs.length){
    setTimeout(()=>{
      noRepel=false;
      noBtn.textContent='…fine. yes 😤';
      noBtn.style.fontSize='.85rem';
      noBtn.style.padding='11px 24px';
      noBtn.style.opacity='1';
      noBtn.onclick=nextQuestion;
      // nudge it to a reachable spot
      noBtn.style.left=Math.min(parseInt(noBtn.style.left)||200, window.innerWidth-160)+'px';
      noBtn.style.top =Math.min(parseInt(noBtn.style.top) ||200, window.innerHeight-80)+'px';
    },300);
  }
}

function releaseNo(){
  if(noFixed) return;
  const r = noBtn.getBoundingClientRect();
  noBtn.style.position='fixed';
  noBtn.style.left=r.left+'px';
  noBtn.style.top =r.top +'px';
  noBtn.style.transition='font-size .25s,padding .25s,opacity .3s';
  document.body.appendChild(noBtn);
  noFixed=true;
}

/* ── repel on mouse move ── */
document.addEventListener('mousemove',repelNo);
document.addEventListener('touchmove',e=>{ if(e.touches[0]) repelNo(e.touches[0]); },{passive:true});

function repelNo(e){
  if(!noRepel||!noFixed) return;
  const r  = noBtn.getBoundingClientRect();
  const cx = r.left+r.width/2, cy = r.top+r.height/2;
  const dx = e.clientX-cx,     dy = e.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const threshold=130;
  if(dist<threshold){
    const force=(threshold-dist)/threshold;
    const push=110*force;
    let nx=r.left-(dx/dist)*push;
    let ny=r.top -(dy/dist)*push;
    nx=Math.max(8,Math.min(window.innerWidth -r.width -8,nx));
    ny=Math.max(8,Math.min(window.innerHeight-r.height-8,ny));
    noBtn.style.left=nx+'px';
    noBtn.style.top =ny+'px';
  }
}

function shakeCard(){
  const moves=['-9px','9px','-6px','6px','-3px','0'];
  moves.forEach((v,i)=>setTimeout(()=>card.style.transform=`translateX(${v})`,i*70));
  setTimeout(()=>card.style.transform='',moves.length*70);
}

/* ── FINAL SCREEN ── */
function showFinal(){
  card.style.display='none';
  if(noFixed){ noBtn.style.display='none'; }
  document.getElementById('hbg').style.display='none';
  document.getElementById('finalScreen').classList.add('visible');
  rainHearts();
  spawnConfetti();
}

const heartEmojis=['💕','❤️','🌸','✨','💗','🌺','💫','💖','❣️','🥰','💝','💓','🩷','💞','🌹','⭐','🌙','🫶'];

function rainHearts(){
  const rain=document.getElementById('heartRain');
  function drop(){
    const el=document.createElement('div');
    el.className='hrp';
    el.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    el.style.left=Math.random()*100+'vw';
    const sz=16+Math.random()*32;
    el.style.fontSize=sz+'px';
    const dur=3+Math.random()*4;
    el.style.animationDuration=dur+'s';
    el.style.setProperty('--hd',(Math.random()*80-40)+'px');
    el.style.setProperty('--hr',(Math.random()*80-40)+'deg');
    el.style.setProperty('--hs',(0.7+Math.random()*0.6)+'');
    rain.appendChild(el);
    setTimeout(()=>el.remove(),(dur+.3)*1000);
  }
  for(let i=0;i<50;i++) setTimeout(drop,i*50);
  setInterval(drop,110);
}

function spawnConfetti(){
  const cols=['#e8445a','#f4a947','#9b59b6','#2ecc71','#3498db','#fce4ec','#ff85a1','#fff176','#f48fb1','#80deea'];
  for(let i=0;i<160;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cp';
      const sz=6+Math.random()*10;
      el.style.width=el.style.height=sz+'px';
      el.style.left=Math.random()*100+'vw';
      el.style.top='-20px';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(2+Math.random()*2.5)+'s';
      el.style.animationDelay=(Math.random()*2)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*12);
  }
}

/* ── ambient bg hearts ── */
function bgHeart(){
  const h=['💕','❤️','🌸','✨','💗','🌺','💫','🥀','❣️'];
  const el=document.createElement('div');
  el.className='hf';
  el.textContent=h[Math.floor(Math.random()*h.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.setProperty('--d',(Math.random()*80-40)+'px');
  const dur=7+Math.random()*8;
  el.style.animationDuration=dur+'s';
  el.style.fontSize=(12+Math.random()*16)+'px';
  document.getElementById('hbg').appendChild(el);
  setTimeout(()=>el.remove(),dur*1000);
}
setInterval(bgHeart,900);

// start
loadQuestion(false);
</script>
</body>
</html>
